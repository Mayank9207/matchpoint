# Railway deployment for the MatchPoint FastAPI backend.
#
# Set the service Root Directory to "engine" in the Railway dashboard so this
# file is picked up and the Docker build context is engine/ (the solver bridge
# needs engine/models.py + engine/cpp at build/runtime).
#
# Docs: https://docs.railway.app/reference/config-as-code

[build]
builder = "dockerfile"
dockerfilePath = "backend/Dockerfile"

[deploy]
startCommand = "sh -c 'uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}'"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
